version: "3.8"
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: agilemind_saas
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: agilemind_saas
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-engine:8000
      JWT_SECRET: agilemind-saas-secret-2025!
      REFRESH_SECRET: agilemind-refresh-secret-2025!
      FRONTEND_URL: https://app.agilemind.com
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ai-engine:
        condition: service_started

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"

volumes:
  mysql_data:
